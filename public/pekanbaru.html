<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kirim Menfess Pekanbaru 🚀</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <div class="card p-5 text-center">
      <h1>📨 Kirim Menfess Pekanbaru</h1>
      <p class="mb-4">Tuliskan isi menfess kamu, lalu klik kirim 🚀</p>
      
      <form id="menfessForm">
        <div class="mb-3">
          <textarea class="form-control" id="menfessInput" rows="5" placeholder="Tulis menfess kamu di sini..." required></textarea>
        </div>
        <button type="submit" class="btn btn-custom btn-lg">🚀 Kirim Menfess</button>
      </form>
    </div>
  </div>

  <script>
    document.getElementById('menfessForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const content = document.getElementById('menfessInput').value.trim();

      if (!content) {
        alert('Menfess tidak boleh kosong!');
        return;
      }

      try {
        const res = await fetch('/api/create-menfess', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({ menfess: content })
        });

        const data = await res.json();
        if (data.success) {
          window.location.href = 'success.html';
        } else {
          alert('Gagal mengirim menfess!');
        }
      } catch (err) {
        console.error(err);
        alert('Terjadi kesalahan.');
      }
    });
  </script>
</body>
</html>
