<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Base Pekanbaru 🚀 Menfess</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    body {
      background: linear-gradient(135deg, #ff0000, #ff8c00, #ffff00, #39ff14, #00e5ff, #8a2be2, #ff1493);
      background-size: 600% 600%;
      animation: gradientBG 8s ease infinite;
      font-family: 'Poppins', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
    }
    @keyframes gradientBG {
      0% {background-position: 0% 50%;}
      50% {background-position: 100% 50%;}
      100% {background-position: 0% 50%;}
    }
    .card {
      border-radius: 25px;
      box-shadow: 0 6px 25px rgba(0,0,0,0.4);
      max-width: 650px;
      width: 100%;
      background: rgba(0,0,0,0.75);
      color: #fff;
    }
    .btn-custom {
      background: linear-gradient(90deg, #ff512f, #dd2476);
      color: white;
      border-radius: 50px;
      font-size: 1.1rem;
      padding: 10px 25px;
      margin-top: 15px;
      transition: 0.3s;
      border: none;
      width: 100%;
    }
    .btn-custom:hover {
      transform: scale(1.05);
      background: linear-gradient(90deg, #ff2e63, #ff6b6b);
    }
    h1 {
      font-weight: 700;
      color: #ffde59;
    }
    label {
      font-weight: 600;
    }
  </style>
</head>
<body>

  <div class="container">
    <div class="card p-5">
      <h1 class="text-center mb-4">🚀 Base Pekanbaru</h1>
      <p class="text-center">Kirim menfess kamu di sini, tetap anonim & sesuai aturan ya ✨</p>

      <form id="menfessForm">
        <div class="mb-3">
          <label for="menfess" class="form-label">Isi Menfess</label>
          <textarea class="form-control" id="menfess" rows="5" placeholder="Tulis menfess kamu di sini..." required></textarea>
        </div>

        <div class="mb-3">
          <label for="gambar" class="form-label">Upload Gambar (opsional)</label>
          <input class="form-control" type="file" id="gambar" accept="image/*">
        </div>

        <button type="submit" class="btn btn-custom" id="submitBtn">🚀 Kirim Menfess</button>
      </form>

      <div id="qrisSection" style="display: none; text-align: center;">
        <h4 class="mb-3">Silakan scan kode QRIS ini untuk membayar:</h4>
        <img id="qrisImage" src="" alt="QRIS Code" style="width: 250px; height: 250px;">
        <p class="mt-3">Setelah pembayaran berhasil, menfess Anda akan segera diposting.</p>
        <p>Abaikan halaman ini jika sudah membayar.</p>
        <button class="btn btn-secondary mt-3" onclick="location.reload()">Kirim Menfess Lain</button>
      </div>

      <div class="text-center mt-4">
        <a href="index.html" class="text-warning">⬅️ Kembali ke Halaman Utama</a>
      </div>
    </div>
  </div>

  
  <form id="paymentForm">
  <input type="hidden" name="orderId" value="ORDER123">
  <input type="hidden" name="amount" value="50000">
  <input type="hidden" name="method" value="QRIS">
  <button type="submit">Bayar Sekarang</button>
</form>

<script>
  document.getElementById('paymentForm').addEventListener('submit', async (e) => {
    e.preventDefault();

    const response = await fetch('/api/tripay-create', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        orderId: 'ORDER123',
        amount: 50000,
        method: 'QRIS',
        customer_name: 'User Test',
        customer_email: 'user@example.com',
        customer_phone: '081234567890'
      })
    });

    const data = await response.json();
    if (data.success && data.data.checkout_url) {
      window.location.href = data.data.checkout_url; // langsung redirect ke halaman bayar Tripay
    } else {
      alert('Gagal membuat transaksi');
    }
  });
</script>

</body>
</html>
