<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menfess Sumatra - Sedang Perbaikan</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f4f9;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: #333;
        }

        .container {
            text-align: center;
            background: white;
            padding: 2rem;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            max-width: 400px;
            width: 90%;
        }

        .profile-frame {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            border: 5px solid #ffcc00; /* Warna kuning khas Sumatra */
            margin: 0 auto 1.5rem;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .profile-frame img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        h1 {
            margin: 0;
            font-size: 1.8rem;
            color: #d32f2f; /* Merah aksen */
        }

        p {
            font-size: 1rem;
            line-height: 1.6;
            color: #666;
        }

        .status-badge {
            display: inline-block;
            background: #fff3e0;
            color: #e65100;
            padding: 5px 15px;
            border-radius: 50px;
            font-weight: bold;
            font-size: 0.8rem;
            margin-bottom: 1rem;
            text-transform: uppercase;
        }

        .footer {
            margin-top: 2rem;
            font-size: 0.8rem;
            color: #aaa;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="status-badge">Under Maintenance</div>
        
        <div class="profile-frame">
            <!-- Ini link ke foto selfie kamu -->
            <img src="maintenance.jpeg" alt="Admin Menfess Sumatra">
        </div>

        <h1>Menfess Sumatra</h1>
        <p>Sabar ya, kawan! Saat ini server kami sedang dalam perbaikan penambahan fitur.</p>
        
        <p><i>"Lagi dandan dulu biar makin cakep pas balik nanti!"</i></p>

        <div class="footer">
            &copy; 2026 Menfess Sumatra Team
        </div>
    </div>

</body>
</html>
